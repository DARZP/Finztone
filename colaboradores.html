<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colaboradores - FINZTONE</title>
    
    <link rel="stylesheet" href="main.style.css">
    <link rel="stylesheet" href="modern-styles.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <header class="main-header">
            <a id="back-button" href="#" class="back-button">← Volver</a>
            <img src="images/nombre.png" alt="FINZTONE" class="logo-header">
        </header>

        <main>
            <div class="form-card">
                <h2>Agregar Nuevo Colaborador</h2>
                <form id="add-user-form">
                    <div class="input-group">
                        <label for="user-name">Nombre Completo</label>
                        <input type="text" id="user-name" required>
                    </div>
                    <div class="input-group">
                        <label for="user-email">Correo Electrónico</label>
                        <input type="email" id="user-email" required>
                    </div>
                    <div class="input-group">
                        <label for="user-position">Cargo</label>
                        <input type="text" id="user-position" required>
                    </div>
                    <div class="input-group">
                        <label for="user-salary">Sueldo Bruto Mensual ($)</label>
                        <input type="number" id="user-salary" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Rol del Usuario y Permisos</label>
                        <div class="role-selector-cards">
                            <label class="role-card">
                                <input type="radio" name="user-role" value="empleado" checked>
                                <div class="role-info">
                                    <span class="role-title">Colaborador</span>
                                    <span class="role-desc">Solo puede registrar sus propios gastos e ingresos y enviarlos para su aprobación. No tiene acceso a configuraciones.</span>
                                </div>
                            </label>
                            
                            <label class="role-card">
                                <input type="radio" name="user-role" value="coadmin">
                                <div class="role-info">
                                    <span class="role-title">Co-Administrador</span>
                                    <span class="role-desc">Puede ver registros y generar reportes, pero no puede crear cuentas bancarias ni modificar impuestos.</span>
                                </div>
                            </label>

                            <label class="role-card">
                                <input type="radio" name="user-role" value="admin">
                                <div class="role-info">
                                    <span class="role-title">Administrador</span>
                                    <span class="role-desc">Acceso total. Puede crear cuentas, aprobar transacciones, gestionar impuestos y añadir nuevos usuarios.</span>
                                </div>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary" style="margin-top: 15px; width: 100%;">Agregar Colaborador</button>
                </form>
            </div>
            <div class="list-card">
                <h2>Lista de Colaboradores</h2>
                <div id="user-list"></div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

    <script type="module" src="colaboradores.app.js"></script>
</body>
</html>
