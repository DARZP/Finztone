<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FINZTONE</title>
    
    <link rel="stylesheet" href="main.style.css">
    <link rel="stylesheet" href="modern-styles.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="page-wrapper">
        <header class="main-header">
            <img src="images/nombre.png" alt="FINZTONE" class="logo-header">
            <div class="user-info">
                <span id="user-email">cargando...</span>
                <button id="logout-button">Cerrar Sesión</button>
            </div>
        </header>
    
        <main class="dashboard-container">
            <h2>Herramientas Principales</h2>
            <details class="dashboard-details">
                <summary class="dashboard-summary-tab">
                    <span>📈 Resumen Financiero del Mes</span>
                    <span class="toggle-icon" style="font-size: 0.8em; color: #94a3b8;">▼ Mostrar / Ocultar</span>
                </summary>
                
                <div class="dashboard-summary-content">
                    <div class="summary-cards">
                        <div class="summary-card income-card">
                            <h3>Ingresos</h3>
                            <p id="total-ingresos-mes">$0.00</p>
                        </div>
                        <div class="summary-card expense-card">
                            <h3>Gastos</h3>
                            <p id="total-gastos-mes">$0.00</p>
                        </div>
                        <div class="summary-card balance-card">
                            <h3>Balance Neto</h3>
                            <p id="balance-neto-mes">$0.00</p>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="financialChart" height="70"></canvas>
                    </div>
                </div>
            </details>
            <div class="tools-grid">
    
                <a href="aprobaciones.html" class="tool-card">
                    <div class="tool-icon"><i class="ph ph-clipboard-text"></i></div>
                    <span>Aprobaciones</span>
                </a>
                
                <a href="ingresos.html" class="tool-card">
                    <div class="tool-icon" id="icon-ingresos"><i class="ph ph-hand-coins"></i></div>
                    <span>Ingresos</span>
                </a>
    
                <a href="gastos.html" class="tool-card">
                    <div class="tool-icon" id="icon-gastos"><i class="ph ph-receipt"></i></div>
                    <span>Gastos</span>
                </a>
    
                <a href="nomina.html" class="tool-card">
                    <div class="tool-icon"><i class="ph ph-users-three"></i></div>
                    <span>Nómina</span>
                </a>
    
                <a href="reportes.html" class="tool-card">
                    <div class="tool-icon" id="icon-reportes"><i class="ph ph-chart-line-up"></i></div>
                    <span>Reportes</span>
                </a>
                
                <a href="colaboradores.html" class="tool-card">
                    <div class="tool-icon"><i class="ph ph-identification-card"></i></div>
                    <span>Colaboradores</span>
                </a>
    
                <a href="empresas.html" class="tool-card">
                    <div class="tool-icon"><i class="ph ph-buildings"></i></div>
                    <span>Empresas</span>
                </a>
    
                <a href="cuentas.html" class="tool-card">
                    <div class="tool-icon"><i class="ph ph-bank"></i></div>
                    <span>Cuentas</span>
                </a>
    
                <a href="impuestos.html" class="tool-card">
                    <div class="tool-icon"><i class="ph ph-scales"></i></div>
                    <span>Impuestos</span>
                </a>
    
                <a href="mi_perfil.html" class="tool-card">
                    <div class="tool-icon" id="icon-perfil"><i class="ph ph-user-circle"></i></div>
                    <span>Mi Perfil</span>
                </a>
    
                <a href="configuracion.html" class="tool-card">
                    <div class="tool-icon" id="icon-config"><i class="ph ph-gear"></i></div>
                    <span>Configuración</span>
                </a>
    
            </div>
        </main>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

    <script type="module" src="dashboard.app.js"></script>

</body>
</html>
